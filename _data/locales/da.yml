live_info: |
  Vær opmærksom på følgende begrænsninger for live-aftrykkene:
  * De bør ikke bruges til at installere eller opgradere. Brug i stedet installationsmediet.
  * De har et begrænset udvalg af pakker og drivere, så de kan ikke betragtes som en præcis afspejling af, om distributionen vil fungere på din hardware eller ej.
  * Kernel og initrd kan ikke opdateres, så de bør ikke bruges som en persistent installation.
