leap_16_coming_soon: |
  Offentlig udgivelse af Leap 16.0, en efterfølger til Leap 15.6, kan forventes i efteråret 2025. Der er ingen planer om at lave Leap 15.7.<br/>
  Tjek regelmæssigt for opdateringer på vores <a href="https://en.opensuse.org/openSUSE:Roadmap">køreplan</a> og <a href="https://news.opensuse.org/tag/leap">news.opensuse.org</a> for mere information.
