selfinstall_rt_image: Selvinstallerende realtids-aftryk
snapper: Blev systemet korrupt? Ikke noget problem længere
snapper_p1: |
  Funktionen Filsystem-snapshots holder styr på dit filsystem ved at
  lade løbende sikkerhedskopier udføres automatisk, når du installerer
  software og opdateringer. Du skal blot starte fra et tidligere snapshot, og
  dit system kan nu fungere på få minutter.
software: Det kunne ikke være lettere at få software
software_p1: |
  Mellem os er det et stort arbejde at skulle gennemgå alle hjemmesider
  for at få al den software, du måtte have brug for. Online softwarecenteret
  gør det nemmere ved at integrere software fra et væld af kilder på ét sted.
software_get: Få software
transactional: Transaktionsserver
transactional_p1: |
  Installationsprogrammet understøtter nu en ny systemrolle, Transactional Server,
  som er et resultat af openSUSE Kubic-indsatsen. Denne systemrolle
  har et nyt opdateringssystem, der anvender opdateringer atomart (som en
  enkelt operation) og gør dem nemme at rulle tilbage, hvis det bliver
  nødvendigt. Disse funktioner er baseret på de pakkehåndteringsværktøjer,
  som alle andre SUSE- og openSUSE-distributioner er afhængige af. Det betyder,
  at langt de fleste RPM-pakker, der fungerer med andre systemroller i
  openSUSE-distributioner, også fungerer med systemrollen Transactional Server.
yast: YaST, det bedste valg for ~~ekspert~~brugere
yast_p1: |
  Et af de bedste systemkonfigurationsværktøjer hjælper dig, brugeren, med at
  opsætte alle aspekter af dit system. Du behøver ikke længere at
  gå igennem et væld af konfigurationsscripts eller indtaste tvivlsomme kommandoer
  for at få systemet opsat, som du har brug for det.
yast_firewall: Firewall
yast_fonts: Skrifttyper
yast_hardware: Hardware
yast_printer: Printer
yast_scanner: Scanner
yast_sound: Lyd
yast_software: Software
zypper: Zypper, din nye favorit-pakkehåndtering
zypper_p1: |
  Det er hurtigt og nemt at lære. Indeholder zypper-apt, et kompatibilitetslag
  til brug med apt- og apt-get-kommandoer. Det er baseret på libsolv,
  som garanterer både hastighed og reproducerbar løsning af
  afhængigheder. Grænsefladen er klar og har passende farver for
  at være nem at læse. Det er perfekt, hvad mere kan man sige?
