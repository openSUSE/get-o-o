verify_download_p1: |
  Mange applikationer kan verificere checksummen for en download. Det kan
  være vigtigt at verificere din download, da det bekræfter, at du virkelig har den
  ISO-fil, du ønskede at downloade, og ikke en eller anden ødelagt version.
verify_download_p2: |
  For hver ISO tilbyder vi en checksumfil med den tilsvarende SHA256-sum og en signaturfil med en kryptografisk signatur.
verify_download_p3: |
  For at sikre integriteten af den downloadede fil kan du bruge sha256sum til at verificere checksummen og gpgv til at verificere den kryptografiske signatur.
verify_download_pubkey: Det skulle være
verify_download_help: For mere hjælp med at verificere din download, læs
verify_download_checksums_help_link: 
  https://en.opensuse.org/SDB:Download_help#Checksums
desktops: Mange skriveborde, tre som standard
desktops_p1: |
  openSUSE-bidragsprocessen muliggør desktopudvikling for alle,
  så du har mulighed for at vælge din favorit i installationsprogrammet.
  Vi præsenterer aktivt tre skrivebordsmiljøer og tilbyder endnu flere
  i den udvidede softwarevisning i installationsprogrammet.
installation: Installer det som du vil have det
installation_p1: |
  openSUSE-installationsprocessen giver dig alle de muligheder,
  du muligvis har brug for. Vil du installere dit system med mus og
  tastatur? Indlæs installationsprogrammet i grafisk tilstand. Har du ikke en mus
  ved hånden? Aktiver terminalklienten og installer den på den måde. Har du ikke
  fysisk adgang til maskinen? Opret forbindelse til installationsprogrammet eksternt og
  forsæt med installationen. Så enkelt er det.
points_transparent: Alt er transparent
points_transparent_p1: |
  Fra start til slut har hver pakke, der går ind i distributionerne, 
  alle sine kildekoder og byggeskripter åbent synlige for alle.
  Tvivler du på kildekoden? Bare tjek den ud på byggetjenesten.
points_free: Fri software? Dit valg
points_free_p1: |
  Pakker i distributionerne er opdelt i frie og ikke-frie
  kilder. Vil du ikke bruge ikke-frie pakker? Du kan nemt
  deaktivere de ikke-frie kilder. Det er dit valg, ikke vores.
points_welcoming: Bidrag er velkomne
points_welcoming_p1: |
  Vi gør vores bedste for udvikler-miljøet, og vi kan kun gøre det
  muligt når de fortæller, hvad de har brug for. Derfor sikrer vi, at
  det er så let som muligt at bidrage.
