choosing_media_p1: |
  Offline-aftrykket anbefales typisk, da det indeholder de fleste
  af de pakker, der er tilgængelige i distributionen, og ikke kræver
  en netværksforbindelse under installationen.
choosing_media_agama_p1: |
  <a href="https://github.com/agama-project/agama">Agama</a> er det nye installationsprogram, der kan bruges til at installere Leap 16 og Tumbleweed.
  Der er en plan om at understøtte offlineinstallation i Agama. Andre installationsmedier, såsom selvinstallationsbillede, vil blive tilføjet senere.
choosing_media_micro_p1: |
  Det nye selvinstallationsbillede er det foretrukne valg til USB- eller DVD-baserede installationer.
  En simpel selvinstallationsguide dumper et forudkonfigureret billede til drevet og udvider partitionen til diskens størrelse.
  <br>
  Brugere med Raspberry Pi og lignende uden understøttelse af USB-boot kan direkte skrive det forudkonfigurerede billede til SD-kortet.
  Brugere, der ønsker mere kontrol over implementeringen, rådes til at bruge <a href="https://en.opensuse.org/Portal:MicroOS/Combustion">Combustion</a>.
  <br>
  En demo af en combustion-baseret implementering kan ses <a href="https://www.youtube.com/watch?v=ANh5FHZDOxo">her</a>.
  <br>
  jeos-firstboot vil hilse dem, der ikke har konfigureret deres system ved hjælp af Combustion, velkommen.
choosing_media_p2: |
  Netværksbilledet anbefales til brugere med begrænset båndbredde på deres internetforbindelser, da det kun downloader de pakker, de vælger at installere, hvilket sandsynligvis vil være betydeligt mindre end 4,7 GB.
choosing_media_micro_p2: |
  Leap Micro leveres ikke længere med et traditionelt installationsprogram. Brugere skal i stedet bruge selvinstallerende medier.
  Det nye Packages Image er blot en offline dump af Leap Micro rpm-arkivet til dem med isolerede miljøer.
