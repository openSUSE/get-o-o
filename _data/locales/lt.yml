leap_micro_ovw_title: „Leap Micro“ yra itin patikima, lengva operacinė sistema, 
  sukurta konteinerizuotiems ir virtualizuotiems darbo krūviams.
leap_micro_ovw_desc_p1: Ši bendruomeninė versija yra pagrįsta „SUSE Linux 
  Micro“, kuri išnaudoja įmonių aplinkai užgrūdintus „SUSE Linux Enterprise“ 
  saugumo ir atitikties reikalavimams komponentus. Toks technologijų sujungimas 
  suteikia modernią, nekintamą ir kūrėjams draugišką OS platformą.
leap_micro_ovw_desc_p2: „Leap Micro“ nuo 6.0 siūlo savarankiško diegimo 
  atvaizdį, RAW atvaizdį ir Paketų DVD, kuris gali būti naudojamas kaip 
  neprisijungus pasiekiama saugykla. Savarankiško diegimo atvaizdis yra mūsų 
  rekomendacija diegimui iš USB laikmenos, nes tradicinių diegiklių 
  nebenaudojame. Naudotojai gali automatizuoti ir pritaikyti diegimą naudodami 
  <a href="https://en.opensuse.org/Portal:MicroOS/Ignition">Ignition</a> arba <a
  href="https://github.com/openSUSE/combustion">Combustion</a>, arba 
  pasitelkdami `jeos-firstboot` vedlį. Išbandykite <a 
  href="https://opensuse.github.io/fuel-ignition/">Fuel Ignition</a> – mūsų 
  internetinį „Ignition“ konfigūracijos generatorių.
leap_micro_ovw_desc_p3: „Leap Micro“ išbandykite VM aplinkoje, veikiančioje su 
  <a href="https://www.suse.com/c/happened-kernel-xen/">Xen</a> arba KVM. 
  Naudojant „Raspberry Pi“ ar kitą „System on Chip“ aparatinę įrangą, galima 
  rinktis iš anksto sukonfigūruotą atvaizdį. Tiek iš anksto sukonfigūruoti, tiek
  savarankiškai įdiegiami atvaizdžiai yra skirti naudoti su <a 
  href="https://en.opensuse.org/Portal:MicroOS/Combustion">Combustion</a>, 
  įrašytu į USB laikmeną, kuri naudojama tam, kad per pirmąjį sistemos paleidimą
  būtų galima atlikti konfigūraciją bet kurioje sistemoje, su galimybe taikyti 
  numatytuoju slaptažodžiu apsaugotus pakeitimus.
leap_micro_ovw_video_desc: '### „Leap Micro 6.1“ diegimo demonstracija su pilnu disko
  šifravimu ir dviejų faktorių autentifikavimu „Cockpit“'
leap_160_ovw_video_desc: '### „Leap 16.0“ išleidimo tiesioginė transliacija'
microos_ovw_title: Mikropaslaugų operacinė sistema, teikianti transakcinius 
  (atominius) atnaujinimus, naudojant tik skaitymui skirtą `btrfs` šakninę failų
  sistemą
microos_ovw_desc_p1: Sukurta talpinti konteinerių darbo krūvius su automatizuotu
  administravimu ir pataisų diegimu. Įsidiegę openSUSE MicroOS gaunate greitą, 
  mažą aplinką konteineriams diegti arba bet kuriam kitam darbo krūviui, kuriam 
  naudingi transakciniai (atomini) atnaujinimai. Kaip nuolat atnaujinamas 
  (rolling release) platinimas, programinė įranga visada yra naujausios 
  versijos.
microos_ovw_desc_p2: „MicroOS“ siūlo **neprisijungusį (offline) atvaizdį**. 
  Pagrindinis skirtumas tarp **offline** ir **self-install/raw** atvaizdžių yra 
  tas, kad **offline atvaizdis turi diegiklį**. Tuo tarpu **raw** ir 
  **self-install** leidžia atlikti pritaikymą naudojant **Combustion** arba 
  **rankiniu būdu pačiame atvaizde** po to, kai jis įrašomas į diską. Taip pat 
  yra galimybė pasirinkti **realiojo laiko (real-time) branduolį**.
microos_ovw_desc_p3: „MicroOS“ išbandykite VM aplinkoje, veikiančioje su <a 
  href="https://www.suse.com/c/happened-kernel-xen/">Xen</a> arba KVM. Naudojant
  „Raspberry Pi“ ar kitą „System on Chip“ aparatinę įrangą, galima naudoti iš 
  anksto sukonfigūruotą atvaizdį kartu su <a 
  href="https://en.opensuse.org/Portal:MicroOS/Combustion">Combustion</a> 
  funkcionalumu paleidimo metu. Tiek iš anksto sukonfigūruoti, tiek 
  savarankiškai įdiegiami atvaizdžiai yra skirti naudoti su <a 
  href="https://en.opensuse.org/Portal:MicroOS/Combustion">Combustion</a>, 
  įrašytu į USB laikmeną, kuri naudojama tam, kad per pirmąjį sistemos paleidimą
  būtų galima atlikti konfigūraciją bet kurioje sistemoje, su galimybe taikyti 
  numatytuoju slaptažodžiu apsaugotus pakeitimus.
