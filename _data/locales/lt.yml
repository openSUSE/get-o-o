MicroOS_features:
  key:
    name: Saugūs atnaujinimai
    description: |
      * Gaukite atnaujinimus per HTTPS  
      * Paketus ir saugyklas pasirašo mūsų kūrimo sistema  
      * Paketai yra patikrinami  
      * Esant priklausomybių konfliktams, atnaujinimai neatliekami  
      * Nešvaistoma vieta: nesėkmingų atnaujinimų atveju failų sistemos momentinės kopijos ištrinamos
  idea:
    name: Filosofija
    description: "### Yra nuspėjama\n* Nėra keičiama vykdymo metu \n* Kiekvieną kartą
      paleidžiant kompiuterį bus nuosekliai paleisti tie patys artefaktai\n\n### Galima
      padauginti \n* Nebereikia konfigūruoti atskirų egzempliorių paleidimo metu \n\
      \ * Galima lengvai pakartotinai naudoti ir gauti nuspėjamą rezultatą\n\n###
      Yra patikima \n* Automatinis atstatymas po netinkamų atnaujinimų\n"
  tool:
    name: Derinimas
    description: |
      ### Derinimo įrankinės konteineris  
      * Paleidžia privilegijuotą konteinerį  
      * Šakninė failų sistema pasiekiama kataloge `/media/root`  
      * `zypper` galima įdiegti reikalingus įrankius, jie pasiekiami be perkrovimo  
      * Išlieka tarp naudojimų
  update:
    name: Atominiai atnaujinimai
    description: |
      ###    Transakciniai atnaujinimai

      Unikalūs
      Naudojant btrfs su momentinėmis kopijomis, „MicroOS“ naudoja labai vietą taupantį būdą saugoti failų sistemos istoriją. Visi konfigūracijos failai, esantys /etc, yra momentinės kopijos dalis ir įtraukiami į grąžinimą.

      #### Lankstūs
      * Nereikia naujo paketų formato, naudokite standartinius openSUSE RPM
      *  Nėra dydžio apribojimų nei skaidiniams, nei operacinei sistemai
      *  Lengva išplėsti
  shield:
    name: Grąžinimas (į ankstesnę būseną)
    description: |
      ### „MicroOS“ yra nekintama operacinė sistema, todėl grąžinimas paprastas  
      * Nekintama: diske neatliekami jokie pakeitimai  
      * Grąžinimas iš naujo paleidžiant sistemą į senesnę BTRFS momentinę kopiją
  work:
    name: Darbo krūviai
    description: |
      Programos diegiamos konteineriuose, o ne šakninėje failų sistemoje:  
      * Atskirtos nuo pagrindinės failų sistemos  
      * Sumažinta galimybė kenkėjiškoms programoms kompromituoti sistemą  
      * Naujas diegimas be perkrovimo  
      * Galimas atnaujinimas atominiu būdu (sukurti naują, nutraukti seną)  
      * Paprastas grąžinimas (rollback)
